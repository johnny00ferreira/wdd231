<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Chamber</title>

    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">

    <script defer src="scripts/navigation-index.js"></script>
</head>

<body>

    <header>
        <img src="images/logo.webp" alt="Chamber Logo">
        <span>Chamber of Commerce</span>
        <button id="menu">☰</button>
    </header>

    <nav class="navigation">
        <a href="index.html">Home</a>
        <a href="directory.html">Directory</a>
        <a href="join.html" class="active">Join</a>
    </nav>

    <main class="join-container">

        <!-- FORM -->
        <section>
            <h1>Membership Application</h1>

            <form method="get" action="thankyou.html" class="join-form">

                <label>
                    First Name
                    <input type="text" name="firstName" title="Enter your first name" autocomplete="given-name"
                        required>
                </label>

                <label>
                    Last Name
                    <input type="text" name="lastName" title="Enter your last name" autocomplete="family-name" required>
                </label>

                <label>
                    Organization Title
                    <input type="text" name="orgTitle" title="At least 7 characters, letters, hyphens, spaces"
                        pattern="[A-Za-z\s-]{7,}" autocomplete="organization-title">
                </label>

                <label>
                    Email
                    <input type="email" name="email" title="Enter your email" placeholder="example@email.com"
                        autocomplete="email" required>
                </label>

                <label>
                    Mobile Phone
                    <input type="tel" name="phone" title="Enter your phone" autocomplete="tel" required>
                </label>

                <label>
                    Organization Name
                    <input type="text" name="organization" title="Enter organization name" autocomplete="organization"
                        required>
                </label>

                <label>
                    Membership Level
                    <select name="membership" required>
                        <option value="">Select</option>
                        <option value="np">NP Membership</option>
                        <option value="bronze">Bronze</option>
                        <option value="silver">Silver</option>
                        <option value="gold">Gold</option>
                    </select>
                </label>

                <label>
                    Business Description
                    <textarea name="description" title="Describe your business"></textarea>
                </label>

                <input type="hidden" id="timestamp" name="timestamp">

                <input type="submit" value="Apply Now">

            </form>
        </section>

        <!-- CARDS -->
        <section class="join-cards">

            <div class="join-card">
                <h3>NP Membership</h3>
                <button onclick="openModal('npModal')">View Benefits</button>
            </div>

            <div class="join-card">
                <h3>Bronze</h3>
                <button onclick="openModal('bronzeModal')">View Benefits</button>
            </div>

            <div class="join-card">
                <h3>Silver</h3>
                <button onclick="openModal('silverModal')">View Benefits</button>
            </div>

            <div class="join-card">
                <h3>Gold</h3>
                <button onclick="openModal('goldModal')">View Benefits</button>
            </div>

        </section>

    </main>

    <!-- MODALS -->
    <dialog id="npModal">
        <p>Free membership for non-profits.</p>
        <button onclick="closeModal('npModal')">Close</button>
    </dialog>

    <dialog id="bronzeModal">
        <p>Basic advertising benefits.</p>
        <button onclick="closeModal('bronzeModal')">Close</button>
    </dialog>

    <dialog id="silverModal">
        <p>Events and discounts included.</p>
        <button onclick="closeModal('silverModal')">Close</button>
    </dialog>

    <dialog id="goldModal">
        <p>Premium exposure and training.</p>
        <button onclick="closeModal('goldModal')">Close</button>
    </dialog>

    <footer>
        <p>&copy; Chamber of Commerce</p>
    </footer>

    <script>
        // timestamp
        document.getElementById("timestamp").value = new Date().toISOString();

        // modals
        function openModal(id) {
            document.getElementById(id).showModal();
        }

        function closeModal(id) {
            document.getElementById(id).close();
        }
    </script>

</body>

</html>
